spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/warehouse?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.warehouse.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      # P0 修复:移除 logic-delete-field/logic-delete-value/logic-not-delete-value
      # 原因:没有任何 entity 声明 deleted 字段或 @TableLogic 注解(项目未启用逻辑删除),
      #      全局配置 logic-delete-field 会让 MyBatis-Plus 在所有 UPDATE/SELECT 自动追加
      #      `WHERE deleted = '0'`,但 t_product 等业务表都没有 deleted 列,
      #      SQL 报 `Unknown column 'deleted' in 'where clause'`,导致所有写入操作失败
      #      但前端仍显示"操作成功"(异常被 GlobalExceptionHandler 兜底为 500 + 通用错误)。
      # 修复时间:2026-06-19  验证:MybatisPlusLogicalDeleteConfigConsistencyTest

jwt:
  access-secret: warehouse-jwt-access-secret-key-must-be-long-enough-256bit
  refresh-secret: warehouse-jwt-refresh-secret-key-must-be-long-enough-256bit
  access-expiration: 900000
  refresh-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.warehouse.controller

server:
  port: 8080

logging:
  level:
    com.warehouse: debug
